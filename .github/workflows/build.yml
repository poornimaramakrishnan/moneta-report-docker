name: Build & Generate Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: moneta-report-generator
  DOCKER_BUILDKIT: "1"

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          echo "$SOURCE_REPO_TOKEN" > /tmp/gh_token
          DOCKER_BUILDKIT=1 docker build \
            --secret id=github_token,src=/tmp/gh_token \
            -t ${{ env.IMAGE_NAME }}:latest .
          rm -f /tmp/gh_token

      - name: Verify image
        run: docker run ${{ env.IMAGE_NAME }}:latest --help

  generate-report:
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          echo "$SOURCE_REPO_TOKEN" > /tmp/gh_token
          DOCKER_BUILDKIT=1 docker build \
            --secret id=github_token,src=/tmp/gh_token \
            -t ${{ env.IMAGE_NAME }}:latest .
          rm -f /tmp/gh_token

      - name: Generate report from sample data
        run: |
          if [ -f sample/report_output.json ]; then
            docker run \
              -v "$(pwd)/sample:/data" \
              ${{ env.IMAGE_NAME }}:latest \
              --input /data/report_output.json \
              --output /data/MonetaReport.xlsx \
              -v
            echo "Report generated successfully"
          else
            echo "No sample data found in sample/ directory"
          fi

      - name: Upload generated report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MonetaReport
          path: sample/MonetaReport.xlsx
          if-no-files-found: ignore
